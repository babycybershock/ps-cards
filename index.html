<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0c18;
    --surface: rgba(255,255,255,.06);
    --border: rgba(255,255,255,.1);
    --text: rgba(255,255,255,.9);
    --sub: rgba(255,255,255,.45);
    --muted: rgba(255,255,255,.25);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, rgba(14,12,24,.96) 0%, rgba(14,12,24,.82) 100%);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 16px 10px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .header-title-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .header-eyebrow {
    font-size: 8px;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .header-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 22px;
    font-weight: 400;
    color: #f5e8f0;
    letter-spacing: -0.01em;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .mode-toggle {
    display: flex;
    gap: 0;
    background: rgba(255,255,255,.07);
    border-radius: 8px;
    padding: 2px;
    border: 0.5px solid var(--border);
  }

  .mode-btn {
    background: transparent;
    border: none;
    color: var(--sub);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .mode-btn.active {
    background: rgba(255,255,255,.15);
    color: var(--text);
  }

  /* filter scrolls */
  .filter-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    margin-bottom: 6px;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    background: rgba(255,255,255,.06);
    border: 0.5px solid var(--border);
    color: var(--sub);
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .chip.active {
    background: rgba(255,255,255,.16);
    border-color: rgba(255,255,255,.3);
    color: var(--text);
  }

  .chip .dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  .chip .count {
    opacity: 0.5;
    margin-left: 6px;
  }

  /* ── DRAW MODE ── */
  #draw-mode {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 80px;
    gap: 24px;
    min-height: calc(100dvh - 140px);
    justify-content: center;
  }

  .card-stack {
    position: relative;
  }

  .card-ghost {
    position: absolute;
    border-radius: 16px;
    background: rgba(40,40,55,.5);
    border: 0.5px solid rgba(255,255,255,.08);
    box-shadow: 0 8px 30px rgba(0,0,0,.4);
    pointer-events: none;
  }

  .card-wrapper {
  }

  /* ── THE CARD ── */
  .card {
    position: relative;
    border-radius: 16px;
    cursor: pointer;
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,.2,.2,1);
    -webkit-tap-highlight-color: transparent;
  }

  .card.flipped {
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  .card-back {
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
  }

  .card-back-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: rgba(0,0,0,.35);
    text-transform: uppercase;
  }

  .card-front {
    transform: rotateY(0deg);
  }

  .card-inner-border {
    position: absolute;
    inset: 12px;
    border-radius: 10px;
    pointer-events: none;
  }

  .card-meta-top {
    position: absolute;
    top: 18px;
    left: 18px;
    right: 18px;
    display: flex;
    justify-content: space-between;
    font-size: 8px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .card-prompt {
    position: absolute;
    left: 9%;
    right: 9%;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 500;
    line-height: 1.3;
    text-wrap: pretty;
  }

  .card-meta-bottom {
    position: absolute;
    bottom: 18px;
    left: 18px;
    right: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .card-glyph {
    line-height: 1;
  }

  /* card decorations */
  .card-foil {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .card-grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.08;
    mix-blend-mode: overlay;
  }

  .card-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(10px);
    pointer-events: none;
  }

  /* ── DRAW CONTROLS ── */
  .draw-controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-primary {
    background: rgba(255,255,255,.14);
    border: 0.5px solid rgba(255,255,255,.3);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    min-height: 40px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary:active { opacity: 0.75; transform: scale(0.97); }

  .btn-ghost {
    background: transparent;
    border: 0.5px solid var(--border);
    color: var(--sub);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    min-height: 40px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-ghost:active { opacity: 0.7; transform: scale(0.97); }

  .draw-counter {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-align: center;
  }

  /* ── GALLERY MODE ── */
  #gallery-mode {
    padding: 16px 0 80px;
  }

  .gallery-face-toggle {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 14px;
    padding: 0 16px;
  }

  /* Horizontal swipe shelf */
  .gallery-shelf {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 4px 16px 16px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .gallery-shelf::-webkit-scrollbar { display: none; }

  .gallery-shelf-cell {
    flex-shrink: 0;
    scroll-snap-align: start;
  }

  .gallery-group-header {
    padding: 0 16px;
    margin-bottom: 10px;
  }

  .gallery-group-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,.9);
    margin-bottom: 2px;
  }

  .gallery-group-meta {
    font-size: 8px;
    letter-spacing: 0.3em;
    color: var(--muted);
  }

  .gallery-group {
    margin-bottom: 32px;
  }

  .gallery-flat-shelf {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    font-size: 8px;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 28px 16px 40px;
  }

  /* ── ANIMATIONS ── */
  @keyframes cardDeal {
    from { opacity: 0; transform: translateY(20px) scale(0.94); }
    to   { opacity: 1; transform: none; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }

  .anim-deal { animation: cardDeal 0.45s cubic-bezier(.2,.8,.3,1.05) both; }
  .anim-fade { animation: fadeIn 0.3s ease both; }
</style>
</head>

// ── STATE ──
let mode = 'gallery';
let depthFilter = 'all';
let catFilter = 'all';
let faceDown = false;
let galleryFlipped = new Set();

// draw state
let drawPool = [];
let drawOrder = [];
let drawPos = 0;
let drawFlipped = true; // true = back showing (face down) by default

// ── UTILS ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getFilteredCards() {
  let cards = CARD_PROMPTS;
  if (depthFilter !== 'all') {
    cards = cards.filter(c => CARD_CATEGORIES[c.category].depth === depthFilter);
  }
  if (catFilter !== 'all') {
    cards = cards.filter(c => c.category === catFilter);
  }
  return cards;
}

// ── CARD HTML BUILDER ──
function rng(n, idx) {
  const x = Math.sin(n * 9301 + idx * 49297) * 233280;
  return x - Math.floor(x);
}

function buildCardHTML(cardData, isFlipped, sizeClass) {
  const cat = CARD_CATEGORIES[cardData.category];
  const pal = PALETTES[cat.palette];

  // Card dimensions based on size
  const isLarge = sizeClass === 'large';
  const isSmall = sizeClass === 'small';
  const w = isLarge ? 'min(340px, 85vw)' : isSmall ? '140px' : 'min(220px, 43vw)';
  const h = isLarge ? 'min(490px, calc(85vw * 1.43))' : isSmall ? '200px' : 'min(316px, calc(43vw * 1.43))';
  const promptSize = isLarge ? 'clamp(18px, 4.5vw, 22px)' : isSmall ? '10px' : 'clamp(13px, 3vw, 16px)';
  const metaSize = isLarge ? '9px' : '7px';
  const glyphSize = isLarge ? '22px' : '14px';

  // Sparkles (deterministic)
  const sparkleCount = cat.palette === 'sparkle' ? 10 : cat.palette === 'magenta' ? 8 : 6;
  let sparkleHTML = '';
  for (let i = 0; i < sparkleCount; i++) {
    const x = rng(i * 2 + 1, cardData.id) * 90;
    const y = rng(i * 2 + 2, cardData.id) * 90;
    const s = 8 + rng(i * 3, cardData.id) * 20;
    const o = 0.2 + rng(i * 5, cardData.id) * 0.5;
    sparkleHTML += `<div style="position:absolute;left:${x}%;top:${y}%;transform:translate(-50%,-50%);pointer-events:none;opacity:${o}">
      <svg width="${s*1.8}" height="${s*1.8}" viewBox="-40 -40 180 180" style="overflow:visible">
        <path d="M50 0 L55 45 L100 50 L55 55 L50 100 L45 55 L0 50 L45 45 Z" fill="${pal.accent}" opacity=".7" filter="url(#sp-blur-${cardData.id})"/>
      </svg></div>`;
  }

  // Orb decoration
  const variant = cardData.id % 4;
  let orbHTML = '';
  if (variant === 0) {
    orbHTML = `<div class="card-orb" style="width:140px;height:140px;background:radial-gradient(circle at 35% 35%,${pal.accentSoft} 0%,transparent 65%);top:-40px;right:-40px"></div>`;
  } else if (variant === 1) {
    orbHTML = `<div class="card-orb" style="width:100px;height:100px;background:radial-gradient(circle at 35% 35%,${pal.accentSoft} 0%,transparent 65%);top:15%;right:-25px"></div>`;
  } else if (variant === 2) {
    orbHTML = `<div class="card-orb" style="width:110px;height:110px;background:radial-gradient(circle at 35% 35%,${pal.accentSoft} 0%,transparent 65%);top:-30px;left:-35px"></div>
               <div class="card-orb" style="width:90px;height:90px;background:radial-gradient(circle at 35% 35%,${pal.accentSoft} 0%,transparent 65%);bottom:-20px;right:-20px"></div>`;
  }

  const textShadow = ['magenta', 'nebula'].includes(cat.palette) ? 'text-shadow:0 1px 10px rgba(0,0,0,.3)' : '';
  const numId = String(cardData.id).padStart(2, '0');

  return `
    <div style="perspective:1200px;-webkit-perspective:1200px">
    <div class="card ${isFlipped ? 'flipped' : ''}" 
         style="width:${w};height:${h};border:0.5px solid ${pal.border};${pal.glow ? 'box-shadow:' + pal.glow + ',0 16px 50px rgba(0,0,0,.4)' : ''}"
         onclick="this.classList.toggle('flipped')">
      <!-- Front face -->
      <div class="card-face card-front" style="background:${pal.bg}">
        <svg width="0" height="0" style="position:absolute">
          <defs><filter id="sp-blur-${cardData.id}"><feGaussianBlur stdDeviation="2"/></filter></defs>
        </svg>
        <!-- Foil -->
        <div class="card-foil" style="background:${pal.foil};mix-blend-mode:${pal.foilBlend};opacity:${pal.foilOpacity}"></div>
        <!-- Grain -->
        <div class="card-grain" style="background:repeating-linear-gradient(${cardData.id*23%180}deg,transparent 0 4px,${pal.accentSoft} 4px 4.5px)"></div>
        ${orbHTML}
        ${sparkleHTML}
        <!-- Inner border -->
        <div class="card-inner-border" style="border:0.5px solid ${pal.border}"></div>
        <!-- Top meta -->
        <div class="card-meta-top" style="color:${pal.sub};font-size:${metaSize}">
          <span>${cat.label}</span>
          <span>№ ${numId}/60</span>
        </div>
        <!-- Prompt -->
        <div class="card-prompt" style="font-size:${promptSize};color:${pal.ink};${textShadow}">
          ${cardData.prompt}
        </div>
        <!-- Bottom meta -->
        <div class="card-meta-bottom" style="color:${pal.sub};font-size:${metaSize}">
          <span class="card-glyph" style="font-size:${glyphSize};color:${pal.accent}">${cat.glyph}</span>
          <span>${cat.depth}</span>
        </div>
      </div>
      <!-- Back face -->
      <div class="card-face card-back" style="background:#ffffff;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px">
        <div style="position:absolute;inset:12px;border-radius:10px;border:0.5px solid rgba(0,0,0,.08);pointer-events:none"></div>
        <svg width="52%" height="auto" viewBox="0 0 64 44" style="overflow:visible;max-width:110px">
          <defs>
            <radialGradient id="b1c-${cardData.id}" cx="35%" cy="30%"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="transparent"/></radialGradient>
            <radialGradient id="b2c-${cardData.id}" cx="35%" cy="30%"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="transparent"/></radialGradient>
          </defs>
          <ellipse cx="22" cy="24" rx="19" ry="17" fill="#5b8cff" transform="rotate(5,22,24)"/>
          <ellipse cx="22" cy="24" rx="19" ry="17" fill="url(#b1c-${cardData.id})" opacity=".3" transform="rotate(5,22,24)"/>
          <circle cx="18" cy="21" r="2" fill="#0a0a0a"/>
          <circle cx="28" cy="20.5" r="2" fill="#0a0a0a"/>
          <path d="M18 27 Q23 32 28 27" fill="none" stroke="#0a0a0a" stroke-width="1.8" stroke-linecap="round"/>
          <ellipse cx="46" cy="27" rx="13" ry="12" fill="#ffd84a" transform="rotate(-8,46,27)"/>
          <ellipse cx="46" cy="27" rx="13" ry="12" fill="url(#b2c-${cardData.id})" opacity=".25" transform="rotate(-8,46,27)"/>
          <circle cx="41" cy="24.5" r="1.7" fill="#0a0a0a"/>
          <circle cx="48" cy="25" r="1.7" fill="#0a0a0a"/>
          <path d="M41 30 Q45 34 49 30" fill="none" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <div style="font-family:'JetBrains Mono',monospace;font-size:${metaSize};letter-spacing:0.35em;color:rgba(0,0,0,.4);text-transform:uppercase">P+S CARDS</div>
      </div>
    </div>
    </div>`;
}

// ── MODES ──
function setMode(m) {
  mode = m;
  document.getElementById('draw-mode').style.display = m === 'draw' ? 'flex' : 'none';
  document.getElementById('gallery-mode').style.display = m === 'gallery' ? 'block' : 'none';
  document.getElementById('btn-gallery').classList.toggle('active', m === 'gallery');
  document.getElementById('btn-draw').classList.toggle('active', m === 'draw');
  if (m === 'draw') renderDraw();
  if (m === 'gallery') renderGallery();
}

// ── DRAW ──
function initDraw() {
  drawPool = getFilteredCards();
  drawOrder = shuffle(drawPool.map((_, i) => i));
  drawPos = 0;
  drawFlipped = true; // true = back showing (face down) by default
}

function renderDraw() {
  if (!drawPool.length) initDraw();
  const card = drawPool[drawOrder[drawPos]];
  if (!card) return;

  const wrapper = document.getElementById('card-wrapper');
  const w = Math.min(340, window.innerWidth * 0.85);
  const h = w * 1.43;

  // ghosts
  const stack = document.getElementById('card-stack');
  const existingGhosts = stack.querySelectorAll('.card-ghost');
  existingGhosts.forEach(g => g.remove());
  for (let i = 3; i >= 1; i--) {
    const g = document.createElement('div');
    g.className = 'card-ghost';
    g.style.cssText = `width:${w}px;height:${h}px;top:${i*3}px;left:${i*3}px;z-index:-${i};opacity:${0.35 + (3-i)*0.15}`;
    stack.insertBefore(g, wrapper);
  }

  wrapper.innerHTML = `<div class="anim-deal">${buildCardHTML(card, drawFlipped, 'large')}</div>`;
  document.getElementById('btn-reveal').textContent = drawFlipped ? '✦ REVEAL' : '↻ FLIP';
  document.getElementById('draw-counter').textContent =
    String(drawPos + 1).padStart(2, '0') + ' / ' + String(drawPool.length).padStart(2, '0');
}

function toggleReveal() {
  drawFlipped = !drawFlipped;
  const card = document.querySelector('#card-wrapper .card');
  if (card) card.classList.toggle('flipped', drawFlipped);
  document.getElementById('btn-reveal').textContent = drawFlipped ? '✦ REVEAL' : '↻ FLIP';
}

function drawNext() {
  drawFlipped = true; // always show back on next card
  drawPos = (drawPos + 1) % drawPool.length;
  renderDraw();
}

function reshuffle() {
  drawFlipped = false;
  drawOrder = shuffle(drawPool.map((_, i) => i));
  drawPos = 0;
  renderDraw();
}

// ── GALLERY ──
function renderGallery() {
  const cards = getFilteredCards();
  const container = document.getElementById('gallery-grid-container');
  container.innerHTML = '';

  // Card width for shelf: 85vw, max 320px
  const cardW = Math.min(320, window.innerWidth * 0.85);

  const groups = {};
  Object.keys(CARD_CATEGORIES).forEach(k => groups[k] = []);
  cards.forEach(c => groups[c.category].push(c));
  const groupedCats = Object.keys(CARD_CATEGORIES).filter(k => groups[k].length > 0);

  if (catFilter !== 'all') {
    // Single category — vertical single-column scroll
    const shelf = document.createElement('div');
    shelf.className = 'gallery-flat-shelf';
    cards.forEach(c => {
      const isFlipped = faceDown ? !galleryFlipped.has(c.id) : galleryFlipped.has(c.id);
      const cell = document.createElement('div');
      cell.innerHTML = buildCardHTML(c, isFlipped, 'normal');
      shelf.appendChild(cell);
    });
    container.appendChild(shelf);
    return;
  }

  // All categories — horizontal swipe shelf per category
  groupedCats.forEach(key => {
    const cat = CARD_CATEGORIES[key];
    const group = document.createElement('div');
    group.className = 'gallery-group anim-fade';

    // Header: use cat.label to match the filter chip
    const header = document.createElement('div');
    header.className = 'gallery-group-header';
    header.innerHTML = `
      <div class="gallery-group-title">${cat.name}</div>
      <div class="gallery-group-meta">${cat.label} · ${groups[key].length} CARDS · ${cat.depth.toUpperCase()}</div>
    `;

    const shelf = document.createElement('div');
    shelf.className = 'gallery-shelf';

    groups[key].forEach(c => {
      const isFlipped = faceDown ? !galleryFlipped.has(c.id) : galleryFlipped.has(c.id);
      const cell = document.createElement('div');
      cell.className = 'gallery-shelf-cell';
      cell.innerHTML = buildCardHTML(c, isFlipped, 'normal');
      shelf.appendChild(cell);
    });

    group.appendChild(header);
    group.appendChild(shelf);
    container.appendChild(group);
  });
}

function setFaceMode(down) {
  faceDown = down;
  galleryFlipped = new Set();
  document.getElementById('chip-facedown').classList.toggle('active', down);
  document.getElementById('chip-faceup').classList.toggle('active', !down);
  renderGallery();
}

// ── FILTERS ──
function buildFilters() {
  // Depth
  const depthRow = document.getElementById('depth-filters');
  ['all', 'light', 'medium', 'deep'].forEach(d => {
    const count = d === 'all' ? CARD_PROMPTS.length :
      CARD_PROMPTS.filter(c => CARD_CATEGORIES[c.category].depth === d).length;
    const btn = document.createElement('button');
    btn.className = 'chip' + (d === depthFilter ? ' active' : '');
    btn.innerHTML = `${d === 'all' ? 'ALL' : d.toUpperCase()} <span class="count">${count}</span>`;
    btn.onclick = () => {
      depthFilter = d;
      catFilter = 'all';
      document.querySelectorAll('#depth-filters .chip').forEach((b, i) => b.classList.toggle('active', i === ['all','light','medium','deep'].indexOf(d)));
      buildCatFilters();
      if (mode === 'gallery') renderGallery();
      else { initDraw(); renderDraw(); }
    };
    depthRow.appendChild(btn);
  });

  buildCatFilters();
}

function buildCatFilters() {
  const catRow = document.getElementById('cat-filters');
  catRow.innerHTML = '';

  const visibleCats = Object.entries(CARD_CATEGORIES)
    .filter(([_, cat]) => depthFilter === 'all' || cat.depth === depthFilter);

  // All button
  const allCount = depthFilter === 'all' ? CARD_PROMPTS.length :
    CARD_PROMPTS.filter(c => CARD_CATEGORIES[c.category].depth === depthFilter).length;

  const allBtn = document.createElement('button');
  allBtn.className = 'chip' + (catFilter === 'all' ? ' active' : '');
  allBtn.innerHTML = `ALL <span class="count">${allCount}</span>`;
  allBtn.onclick = () => {
    catFilter = 'all';
    catRow.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    if (mode === 'gallery') renderGallery();
    else { initDraw(); renderDraw(); }
  };
  catRow.appendChild(allBtn);

  visibleCats.forEach(([key, cat]) => {
    const pal = PALETTES[cat.palette];
    const count = CARD_PROMPTS.filter(c => c.category === key).length;
    const btn = document.createElement('button');
    btn.className = 'chip' + (catFilter === key ? ' active' : '');
    btn.innerHTML = `<span class="dot" style="background:${pal.accent};box-shadow:0 0 6px ${pal.accent}"></span>${cat.label} <span class="count">${count}</span>`;
    btn.onclick = () => {
      catFilter = key;
      catRow.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (mode === 'gallery') renderGallery();
      else { initDraw(); renderDraw(); }
    };
    catRow.appendChild(btn);
  });
}

// ── INIT ──
buildFilters();
setMode('gallery');

// ── SERVICE WORKER (offline cache) ──
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'ps-cards-v1';
    const FONTS = [
      'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap'
    ];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(FONTS).catch(() => {})));
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        }).catch(() => new Response('', { status: 408 })))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
